<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia Sản Phẩm</title>
</head>
<body>

    <h1>Giới thiệu sản phẩm E-Commerce</h1>

    <!-- 3 ảnh sản phẩm -->
    <section>
        <h2>Hình ảnh sản phẩm</h2>

        <figure>
            <img 
                src="https://tse3.mm.bing.net/th/id/OIP.aGdIt0sxDkerGKRR-blNxAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="Điện thoại iPhone 16 màu đen mặt trước"
                loading="lazy"
                style="max-width:100%; height:auto;">
            <figcaption>iPhone 16 màu đen</figcaption>
        </figure>

        <figure>
            <img 
                src="https://tse4.mm.bing.net/th/id/OIP.mZnyxMDtNDj0TbsS0IGrXwHaD4?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="Laptop gaming màu bạc màn hình 15 inch"
                loading="lazy"
                style="max-width:100%; height:auto;">
            <figcaption>Laptop Gaming</figcaption>
        </figure>

        <figure>
            <img 
                src="https://tse3.mm.bing.net/th/id/OIP.AyrTiIfi_ZbsSHOoTIGD8wHaFj?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="Tai nghe bluetooth không dây màu trắng"
                loading="lazy"
                style="max-width:100%; height:auto;">
            <figcaption>Tai nghe Bluetooth</figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <h2>Video giới thiệu trên YouTube</h2>

        <iframe 
            width="560" 
            height="315"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="Video giới thiệu sản phẩm"
            allowfullscreen>
        </iframe>
    </section>

    <hr>

    <!-- Video HTML -->
    <section>
        <h2>Video sản phẩm</h2>

        <video controls poster="https://placehold.co/600x400">
            <source src="video-demo.mp4" type="video/mp4">
            <source src="video-demo.webm" type="video/webm">

            Trình duyệt không hỗ trợ video.
        </video>
    </section>

    <hr>

    <!-- Audio -->
    <section>
        <h2>Nhạc nền giới thiệu</h2>

        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
            Trình duyệt không hỗ trợ audio.
        </audio>
    </section>

    <hr>

    <!-- SVG inline -->
    <section>
        <h2>Logo cửa hàng (SVG)</h2>

        <svg width="200" height="200">
            
            <!-- Hình tròn -->
            <circle 
                cx="100" 
                cy="100" 
                r="80" 
                fill="blue">
            </circle>

            <!-- Chữ -->
            <text 
                x="70" 
                y="110" 
                fill="white"
                font-size="30">
                Shop
            </text>

        </svg>
    </section>

</body>
</html>
