<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Tài Khoản</title>
</head>
<body>

    <h1>Đăng ký tài khoản E-Commerce</h1>

    <form action="#" method="POST">

        <!-- Fieldset 1 -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>

            <label for="fullname">Họ tên:</label>
            <input 
                type="text"
                id="fullname"
                name="fullname"
                placeholder="Nhập họ tên"
                required
                minlength="2"
                maxlength="50">
            <br><br>

            <label for="email">Email:</label>
            <input 
                type="email"
                id="email"
                name="email"
                placeholder="Nhập email"
                required>
            <br><br>

            <label for="phone">Số điện thoại:</label>
            <input 
                type="tel"
                id="phone"
                name="phone"
                placeholder="Nhập số điện thoại 10 số"
                pattern="[0-9]{10}">
            <br><br>

            <label for="birthday">Ngày sinh:</label>
            <input 
                type="date"
                id="birthday"
                name="birthday"
                placeholder="Chọn ngày sinh"
                max="2026-05-10">
            <br><br>

            <label>Giới tính:</label><br>

            <input type="radio" id="male" name="gender" value="Nam">
            <label for="male">Nam</label>

            <input type="radio" id="female" name="gender" value="Nữ">
            <label for="female">Nữ</label>

            <input type="radio" id="other" name="gender" value="Khác">
            <label for="other">Khác</label>

        </fieldset>

        <br>

        <!-- Fieldset 2 -->
        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Username:</label>
            <input 
                type="text"
                id="username"
                name="username"
                placeholder="Tên đăng nhập"
                pattern="^[a-zA-Z0-9_]{3,20}$">
            <br><br>

            <label for="password">Password:</label>
            <input 
                type="password"
                id="password"
                name="password"
                placeholder="Nhập mật khẩu"
                minlength="8"
                pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$">
            <br><br>

            <label for="confirmPassword">Xác nhận password:</label>
            <input 
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Nhập lại mật khẩu"
                minlength="8"
                pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$">

        </fieldset>

        <br>

        <!-- Fieldset 3 -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city">
                <option value="">--Chọn thành phố--</option>
                <option>Hà Nội</option>
                <option>TP Hồ Chí Minh</option>
                <option>Đà Nẵng</option>
                <option>Cần Thơ</option>
                <option>Hải Phòng</option>
            </select>
            <br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option value="">--Chọn quận/huyện--</option>
                <option>Quận A</option>
                <option>Quận B</option>
                <option>Thanh xuân</option>
                <option>Đông Đa</option>
                <option>Cầu Giấy</option>
            </select>
            <br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea 
                id="address"
                name="address"
                rows="3"
                placeholder="Nhập địa chỉ cụ thể">
            </textarea>

        </fieldset>

        <br>

        <!-- Điều khoản -->
        <input type="checkbox" id="agree" name="agree" required>
        <label for="agree">Tôi đồng ý với điều khoản sử dụng</label>

        <br><br>

        <!-- Buttons -->
        <button type="submit">Đăng ký</button>
        <button type="reset">Làm lại</button>

    </form>

</body>
</html>
